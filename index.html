<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Arquitetura & DevOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen no-select">

    <div class="max-w-3xl mx-auto px-4 py-8">
        <header class="mb-8 text-center border-b border-gray-200 pb-6">
            <h1 class="text-3xl font-bold text-indigo-700 mb-2">Avaliação Técnica</h1>
            <p class="text-gray-600">Responda a todas as questões com atenção. O resultado será gerado ao final.</p>
        </header>

        <form id="quiz-form" onsubmit="calcularResultado(event)">
            <div id="container-questoes" class="space-y-6">
                </div>

            <div class="mt-8 text-right">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition duration-200 cursor-pointer">
                    Finalizar e Enviar Prova
                </button>
            </div>
        </form>

        <div id="modal-resultado" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-xl">
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Prova Concluída!</h2>
                <p class="text-gray-600 mb-6">Sua pontuação foi de:</p>
                <div class="text-5xl font-extrabold text-indigo-600 mb-6" id="nota-final">0/0</div>
                <button onclick="fecharModal()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition">
                    Ver Gabarito
                </button>
            </div>
        </div>
    </div>

    <script>
        const questoesData = [
            {
                "id": 1,
                "titulo": "Qual tag HTML é semanticamente mais adequada para representar a navegação principal de um site?",
                "opcoes": ["<div>", "<menu>", "<nav>", "<section>"],
                "correta": 2
            },
            {
                "id": 2,
                "titulo": "Em CSS, qual propriedade é utilizada para transformar um elemento em um container Flexbox?",
                "opcoes": ["position: flex", "display: flex", "flex: true", "layout: flex"],
                "correta": 1
            },
            {
                "id": 3,
                "titulo": "Qual é o objetivo principal do atributo 'alt' em uma imagem HTML?",
                "opcoes": [
                    "Melhorar a resolução da imagem",
                    "Definir a largura da imagem",
                    "Fornecer descrição para acessibilidade e falhas de carregamento",
                    "Aplicar estilos CSS"
                ],
                "correta": 2
            },
            {
                "id": 4,
                "titulo": "Um desenvolvedor deseja capturar o clique de um botão utilizando JavaScript. Qual evento deve ser utilizado?",
                "opcoes": ["onchange", "onsubmit", "onclick", "onfocus"],
                "correta": 2
            },
            {
                "id": 5,
                "titulo": "Qual unidade CSS é mais indicada para criar layouts responsivos?",
                "opcoes": ["px", "cm", "%", "pt"],
                "correta": 2
            },
            {
                "id": 6,
                "titulo": "Qual método JavaScript é utilizado para selecionar um elemento pelo seu ID?",
                "opcoes": [
                    "querySelectorAll()",
                    "getElementById()",
                    "getElementsByClassName()",
                    "findElement()"
                ],
                "correta": 1
            },
            {
                "id": 7,
                "titulo": "Em HTML5, qual elemento representa o conteúdo principal da página?",
                "opcoes": ["<main>", "<article>", "<section>", "<body>"],
                "correta": 0
            },
            {
                "id": 8,
                "titulo": "Ao utilizar CSS Grid, qual propriedade define o número de colunas do layout?",
                "opcoes": [
                    "grid-columns",
                    "grid-layout",
                    "grid-template-columns",
                    "column-template"
                ],
                "correta": 2
            },
            {
                "id": 9,
                "titulo": "Qual das opções abaixo representa corretamente um comentário em HTML?",
                "opcoes": [
                    "// Comentário",
                    "/* Comentário */",
                    "",
                    "# Comentário"
                ],
                "correta": 2
            },
            {
                "id": 10,
                "titulo": "Em JavaScript, qual estrutura é mais adequada para repetir uma ação enquanto uma condição for verdadeira?",
                "opcoes": ["if", "switch", "while", "try"],
                "correta": 2
            }
        ];

        function renderizarQuestoes() {
            const container = document.getElementById('container-questoes');
            if (!container) return;
            
            container.innerHTML = '';

            questoesData.forEach((q, qIdx) => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl shadow-sm border border-gray-100";
                
                let titulo = `<h3 class="text-lg font-semibold text-gray-900 mb-4">${qIdx + 1}. ${q.titulo}</h3>`;
                let opcoesHtml = '<div class="space-y-3">';

                q.opcoes.forEach((opcao, oIdx) => {
                    // Escapa caracteres HTML básicos nas opções para evitar quebras com tags como <div> e <nav>
                    const opcaoEscapada = opcao.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    
                    opcoesHtml += `
                        <label class="flex items-start p-3 rounded-lg border border-gray-200 hover:bg-indigo-50/50 hover:border-indigo-200 transition cursor-pointer">
                            <input type="radio" name="questao-${qIdx}" value="${oIdx}" required class="mt-1 h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500">
                            <span class="ml-3 text-gray-700">${opcaoEscapada}</span>
                        </label>
                    `;
                });

                opcoesHtml += '</div>';
                opcoesHtml += `<div id="feedback-${qIdx}" class="mt-4 hidden p-3 rounded-lg text-sm font-medium"></div>`;
                
                card.innerHTML = titulo + opcoesHtml;
                container.appendChild(card);
            });
        }

        function calcularResultado(event) {
            event.preventDefault();
            let acertos = 0;

            questoesData.forEach((q, qIdx) => {
                const selecionada = document.querySelector(`input[name="questao-${qIdx}"]:checked`);
                const feedbackDiv = document.getElementById(`feedback-${qIdx}`);
                
                if (feedbackDiv) {
                    feedbackDiv.classList.remove('hidden');
                    if (selecionada && parseInt(selecionada.value) === q.correta) {
                        acertos++;
                        feedbackDiv.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200";
                        feedbackDiv.innerText = "✓ Resposta correta!";
                    } else {
                        feedbackDiv.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200";
                        const respostaCorretaTexto = q.opcoes[q.correta].replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        feedbackDiv.innerHTML = `✗ Errada. A resposta correta era: <strong>${respostaCorretaTexto}</strong>`;
                    }
                }
            });

            document.getElementById('nota-final').innerText = `${acertos} / ${questoesData.length}`;
            document.getElementById('modal-resultado').classList.remove('hidden');
        }

        function fecharModal() {
            document.getElementById('modal-resultado').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Garante a execução assim que o DOM estiver pronto, independente de scripts externos
        document.addEventListener('DOMContentLoaded', renderizarQuestoes);
    </script>
</body>
</html>
