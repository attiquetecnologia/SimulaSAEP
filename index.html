<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Arquitetura & DevOps</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Impedir seleção de texto para dificultar o "copiar e colar" no Google */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen no-select">

    <div class="max-w-3xl mx-auto px-4 py-8">
        <header class="mb-8 text-center border-b border-gray-200 pb-6">
            <h1 class="text-3xl font-bold text-indigo-700 mb-2">Avaliação Técnica</h1>
            <p class="text-gray-600">Responda a todas as questões com atenção. O resultado será gerado ao final.</p>
        </header>

        <form id="quiz-form" onsubmit="calcularResultado(event)">
            <div id="container-questoes" class="space-y-6">
                </div>

            <div class="mt-8 text-right">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition duration-200 cursor-pointer">
                    Finalizar e Enviar Prova
                </button>
            </div>
        </form>

        <div id="modal-resultado" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-xl">
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Prova Concluída!</h2>
                <p class="text-gray-600 mb-6">Sua pontuação foi de:</p>
                <div class="text-5xl font-extrabold text-indigo-600 mb-6" id="nota-final">0/0</div>
                <button onclick="fecharModal()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition">
                    Ver Gabarito
                </button>
            </div>
        </div>
    </div>

    <script>
        // Seu banco de dados de questões em formato JSON
        const questoesData = [
            {
                "id": 1,
                "titulo": "Qual padrão arquitetural é mais indicado para desacoplar a comunicação entre microsserviços de forma assíncrona?",
                "opcoes": ["REST (HTTP)", "Event-Driven Architecture (EDA)", "gRPC", "Shared Database"],
                "correta": 1 // Índice da resposta correta (0-based)
            },
            {
                "id": 2,
                "titulo": "No contexto de CI/CD, qual o papel principal da etapa de 'Continuous Deployment'?",
                "opcoes": [
                    "Compilar o código fonte automaticamente.",
                    "Garantir que os testes unitários rodem a cada commit.",
                    "Fazer o deploy automatizado em produção sem intervenção humana manual.",
                    "Gerar relatórios de cobertura de código."
                ],
                "correta": 2
            }
        ];

        // Função para renderizar as questões na tela
        function renderizarQuestoes() {
            const container = document.getElementById('container-questoes');
            container.innerHTML = '';

            questoesData.forEach((q, qIdx) => {
                let card = document.createElement('div');
                card.className = "bg-white p-6 rounded-xl shadow-xs border border-gray-100";
                
                let titulo = `<h3 class="text-lg font-semibold text-gray-900 mb-4">${qIdx + 1}. ${q.titulo}</h3>`;
                let opcoesHtml = '<div class="space-y-3">';

                q.opcoes.forEach((opcao, oIdx) => {
                    opcoesHtml += `
                        <label class="flex items-start p-3 rounded-lg border border-gray-200 hover:bg-indigo-50/50 hover:border-indigo-200 transition cursor-pointer">
                            <input type="radio" name="questao-${qIdx}" value="${oIdx}" required class="mt-1 h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500">
                            <span class="ml-3 text-gray-700">${opcao}</span>
                        </label>
                    `;
                });

                opcoesHtml += '</div>';
                // Div para feedback visual posterior
                opcoesHtml += `<div id="feedback-${qIdx}" class="mt-4 hidden p-3 rounded-lg text-sm font-medium"></div>`;
                
                card.innerHTML = titulo + opcoesHtml;
                container.appendChild(card);
            });
        }

        // Função que processa as respostas
        function calcularResultado(event) {
            event.preventDefault();
            let acertos = 0;

            questoesData.forEach((q, qIdx) => {
                const selecionada = document.querySelector(`input[name="questao-${qIdx}"]:checked`);
                const feedbackDiv = document.getElementById(`feedback-${qIdx}`);
                feedbackDiv.classList.remove('hidden');

                if (selecionada && parseInt(selecionada.value) === q.correta) {
                    acertos++;
                    feedbackDiv.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200";
                    feedbackDiv.innerText = "✓ Resposta correta!";
                } else {
                    feedbackDiv.className = "mt-4 p-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200";
                    feedbackDiv.innerText = `✗ Errada. A resposta correta era: ${q.opcoes[q.correta]}`;
                }
            });

            // Exibe o Modal com a nota
            document.getElementById('nota-final').innerText = `${acertos} / ${questoesData.length}`;
            document.getElementById('modal-resultado').classList.remove('hidden');
        }

        function fecharModal() {
            document.getElementById('modal-resultado').classList.add('hidden');
            // Rola a tela para o topo para ver o gabarito
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Inicializa a renderização ao carregar a página
        window.onload = renderizarQuestoes;
    </script>
</body>
</html>
